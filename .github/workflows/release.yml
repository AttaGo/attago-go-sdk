name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -count=1 -race ./...

      - name: Fetch attago-spec
        uses: actions/checkout@v4
        with:
          repository: AttaGo/attago-spec
          path: attago-spec

      - name: Conformance
        env:
          ATTAGO_BASE_URL: ${{ secrets.ATTAGO_DEV_BASE_URL }}
          ATTAGO_API_KEY: ${{ secrets.ATTAGO_DEV_API_KEY }}
          ATTAGO_SPEC_DIR: ./attago-spec
        run: go test -v -tags conformance -run TestConformance ./...
